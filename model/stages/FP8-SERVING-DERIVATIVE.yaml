apiVersion: nullxes.training-stage/v1
kind: ExportStage
metadata:
  id: FP8-SERVING-DERIVATIVE
  name: FP8 serving derivative export and parity
  status: planned
  tags: [fp8, export, serving-derivative, h200-only, not-run]
spec:
  documentation_only: true
  execution_state: not_run
  input:
    parent_artifact_id: artifact://latex-e01/M4-RELEASE/BF16/PENDING
    parent_sha256: sha256:PENDING_M4
  objective: Convert immutable BF16 M4 into an inference-only FP8 derivative, reload it, and qualify it against the BF16 source without changing the M4 master.
  trainable_scope:
    method: none
    modules: []
    frozen: [all_parameters, tokenizer]
    optimizer_state: none
  runtime:
    provider: RunPod
    accelerator: NVIDIA_H200
    conversion_minimum_gpus: 16
    conversion_recommended_gpus: 32
    final_serving_minimum_gpus_after_fit_and_parity: 8
    provider_attestation_required:
      intra_node: NVLink_NVSwitch
      inter_node: InfiniBand
    local_execution: forbidden
  gates:
    - {id: source_gate, metric: M4_all_bf16_release_gates_passed, operator: eq, threshold: true}
    - {id: source_hash, metric: immutable_M4_bfloat16_sha256_recorded, operator: eq, threshold: true}
    - {id: conversion_capacity, metric: conversion_h200_count, operator: gte, threshold: 16}
    - {id: task_parity, metric: fp8_verified_task_completion_over_bfloat16_ratio, operator: gte, threshold: 0.99}
    - {id: safety_parity, metric: fp8_new_critical_safety_failures, operator: eq, threshold: 0}
    - {id: fit, metric: target_serving_topology_memory_fit_passed, operator: eq, threshold: true}
  export_policy:
    source_dtype: bfloat16
    target_dtype: float8
    merge_after_quantization: forbidden
    training_or_merge_parent: forbidden
    mutate_parent: false
    require_conversion_manifest: true
    require_full_parity_report: true
  outputs:
    artifact_id: artifact://latex-e01/FP8-SERVING-DERIVATIVE/PENDING
    artifact_sha256: sha256:PENDING_FP8
    immutable: true
    source_m4_sha256: sha256:PENDING_M4
    conversion_manifest_id: manifest://latex-e01/FP8-SERVING-DERIVATIVE/NOT_RUN
    parity_evidence_id: evidence://latex-e01/FP8-SERVING-DERIVATIVE/NOT_RUN
    run_id: run://NOT_RUN/FP8-SERVING-DERIVATIVE
