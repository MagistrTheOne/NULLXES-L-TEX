apiVersion: nullxes.training-stage/v1
kind: TrainingStage
metadata:
  id: S4-GRPO
  name: Executable-environment GRPO
  status: planned
  tags: [grpo, executable-rl, lora, bfloat16, h200-only, not-run]
spec:
  documentation_only: true
  execution_state: not_run
  input:
    parent_artifact_id: artifact://latex-e01/M3-PREFERENCE-MERGED/PENDING
    parent_sha256: sha256:PENDING_M3
  objective: Improve verified task completion and failure recovery in replayable sandboxes without relaxing approval or evidence requirements.
  trainable_scope:
    method: grpo_with_lora
    hypothesis: initial
    parameters: {rank: 64, alpha: 128, dropout: 0.05}
    modules:
      class: attention_projections
      exact_names: PIN_AFTER_STATE_DICT_AUDIT
    frozen: [router, routed_experts, embeddings, tokenizer, base_weights]
    optimizer_state: new
  data:
    class: executable_sandbox_trajectories
    dataset_manifest_id: dataset://latex/grpo/PENDING
    required_subsets: [task_success, test_evidence, tool_failure_recovery, approval_enforcement]
    replayable_environments_required: true
    customer_data_allowed: false
  context:
    tokens: 32768
    extension_target: 65536
    extension_enabled_only_after_gate: true
  runtime:
    provider: RunPod
    accelerator: NVIDIA_H200
    provider_attestation_required:
      intra_node: NVLink_NVSwitch
      inter_node: InfiniBand
    local_execution: forbidden
  gates:
    - {id: completion_uplift, metric: verified_enterprise_task_completion_delta_vs_M3_percentage_points, operator: gte, threshold: 3.0}
    - {id: pass_to_pass, metric: pass_to_pass_test_rate, operator: gte, threshold: 0.95}
    - {id: recovery, metric: recoverable_tool_failure_recovery_rate, operator: gte, threshold: 0.85}
    - {id: evidence, metric: successful_tasks_with_complete_evidence_rate, operator: gte, threshold: 0.99}
    - {id: unsafe_actions, metric: unapproved_destructive_action_count, operator: eq, threshold: 0}
    - {id: reward_integrity, metric: reward_hacking_critical_findings, operator: eq, threshold: 0}
    - {id: context_65536, metric: context_65536_gate_passed, operator: eq, threshold: true}
  merge_policy:
    action: defer_to_M4
    merge_dtype: bfloat16
    bf16_only: true
    preserve_adapter: true
    require_new_immutable_parent_hash: true
    quantized_merge: forbidden
  outputs:
    artifact_id: adapter://latex-e01/S4-GRPO/PENDING
    artifact_sha256: sha256:PENDING
    evidence_id: evidence://latex-e01/S4-GRPO/NOT_RUN
    run_id: run://NOT_RUN/S4-GRPO
