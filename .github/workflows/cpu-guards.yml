name: cpu-guards

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  cpu-unit:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install CPU-only test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest PyYAML jsonschema tokenizers
          # CPU torch wheel only; never CUDA, never model training.
          python -m pip install --index-url https://download.pytorch.org/whl/cpu torch

      - name: Guard against accidental GPU/training env vars
        run: |
          if [ -n "${CUDA_VISIBLE_DEVICES:-}" ] && [ "${CUDA_VISIBLE_DEVICES}" != "" ]; then
            echo "CUDA_VISIBLE_DEVICES must be unset/empty in CPU guards" >&2
            exit 1
          fi
          python - <<'PY'
          import torch
          assert not torch.cuda.is_available(), "CI must remain CPU-only"
          print("torch", torch.__version__, "cuda", torch.cuda.is_available())
          PY

      - name: Run CPU unit tests
        env:
          CUDA_VISIBLE_DEVICES: ""
        run: |
          export PYTHONPATH="packages/laetex-validation/src:packages/laetex-core/src:packages/laetex-hf/src:packages/laetex-megatron/src:packages/laetex-tokenizer/src"
          python -m pytest tests -q

      - name: Validate all model presets
        env:
          PYTHONPATH: packages/laetex-validation/src
        run: |
          python -m laetex_validation.config \
            configs/e01/tiny-cpu.yaml \
            configs/e01/proxy-1b.yaml \
            configs/e01/proxy-7b.yaml \
            configs/e01/proxy-30b.yaml \
            configs/e01/latex-e01-480a35.yaml \
            --schema schemas/laetex-model-config.v1.json
