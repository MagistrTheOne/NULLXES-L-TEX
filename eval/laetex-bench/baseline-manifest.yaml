# Readiness/evidence schema. Placeholder values are not experimental results.
schema: laetex.eval.readiness-manifest/v2
schema_version: "2.0.0"

manifest:
  classification: VERIFIED_FACT
  immutable_id: "<IMMUTABLE_MANIFEST_ID>"
  content_hash: "<SHA256>"
  status: template_not_frozen
  created_at_utc: "<RFC3339>"

program:
  classification: VERIFIED_FACT
  model: LÆTEX_E-01
  origin: independent_pretraining_from_scratch
  inherited_checkpoint: null
  target_run_status: not_approved
  experimental_results_claimed: false

architecture_readiness:
  classification: EXPERIMENT_REQUIRED
  spec_hash: "<ARCHITECTURE_SPEC_HASH>"
  pytorch_reference_hash: "<REFERENCE_IMPLEMENTATION_HASH>"
  huggingface_config_hash: "<HF_CONFIG_HASH>"
  megatron_config_hash: "<MEGATRON_CONFIG_HASH>"
  parity_report_hash: "<PYTORCH_HF_MEGATRON_PARITY_REPORT>"
  parameter_count_report_hash: "<PARAMETER_ACCOUNTING_REPORT>"
  initialization_report_hash: "<INITIALIZATION_REPORT>"
  attention_kernel_report_hash: "<HYBRID_ATTENTION_KERNEL_REPORT>"
  moe_router_report_hash: "<ROUTER_LOAD_BALANCE_REPORT>"
  status: not_started

tokenizer_readiness:
  classification: EXPERIMENT_REQUIRED
  candidate_id: "<TOKENIZER_CANDIDATE_ID>"
  training_snapshot_hash: "<TOKENIZER_CORPUS_HASH>"
  model_hash: "<TOKENIZER_MODEL_HASH>"
  vocab_and_special_tokens_hash: "<VOCAB_CONTRACT_HASH>"
  normalization_hash: "<NORMALIZATION_CONFIG_HASH>"
  compression_report_hash: "<DOMAIN_COMPRESSION_REPORT>"
  byte_fallback_report_hash: "<BYTE_FALLBACK_REPORT>"
  multilingual_code_regression_hash: "<TOKENIZER_REGRESSION_REPORT>"
  status: not_started

corpus_readiness:
  classification: EXPERIMENT_REQUIRED
  pretrain_snapshot_merkle_root: "<PRETRAIN_CORPUS_MERKLE_ROOT>"
  accepted_token_count: "<TOKEN_COUNT_BY_TOKENIZER>"
  planning_range_tokens: "4T-6T"
  planning_range_is_approved_budget: false
  hybrid_mix_manifest_hash: "<HYBRID_MIX_HASH>"
  context_curriculum_hash: "<CONTEXT_CURRICULUM_HASH>"
  rights_report_hash: "<RIGHTS_REPORT_HASH>"
  pii_secrets_report_hash: "<PII_SECRETS_REPORT_HASH>"
  dedup_report_hash: "<DEDUP_REPORT_HASH>"
  contamination_report_hash: "<CONTAMINATION_REPORT_HASH>"
  tenant_default_deny_report_hash: "<TENANT_ISOLATION_REPORT_HASH>"
  deletion_impact_drill_hash: "<DELETION_DRILL_HASH>"
  status: not_started

proxy_readiness:
  classification: EXPERIMENT_REQUIRED
  proxy_1b:
    checkpoint_hash: "<1B_CHECKPOINT_HASH>"
    run_manifest_hash: "<1B_RUN_MANIFEST_HASH>"
    scaling_report_hash: "<1B_SCALING_REPORT_HASH>"
    capability_report_hash: "<1B_CAPABILITY_REPORT_HASH>"
    status: not_started
  proxy_7b:
    checkpoint_hash: "<7B_CHECKPOINT_HASH>"
    run_manifest_hash: "<7B_RUN_MANIFEST_HASH>"
    scaling_report_hash: "<7B_SCALING_REPORT_HASH>"
    capability_report_hash: "<7B_CAPABILITY_REPORT_HASH>"
    status: not_started
  proxy_30b:
    checkpoint_hash: "<30B_CHECKPOINT_HASH>"
    run_manifest_hash: "<30B_RUN_MANIFEST_HASH>"
    scaling_report_hash: "<30B_SCALING_REPORT_HASH>"
    capability_report_hash: "<30B_CAPABILITY_REPORT_HASH>"
    economics_report_hash: "<30B_TO_TARGET_ECONOMICS_HASH>"
    required_before_target_approval: true
    status: not_started
  scaling_law_fit_hash: "<SCALING_LAW_FIT_HASH>"
  mup_transfer_report_hash: "<MUP_TRANSFER_REPORT_HASH>"
  target_approval: blocked

pretrain_capability:
  classification: EXPERIMENT_REQUIRED
  heldout_loss_manifest_hash: "<HELDOUT_LOSS_MANIFEST_HASH>"
  tokenizer_metrics_hash: "<TOKENIZER_METRICS_HASH>"
  code_math_language_suite_hash: "<BASE_CAPABILITY_SUITE_HASH>"
  context_suite_hash: "<CONTEXT_SUITE_HASH>"
  routing_health_suite_hash: "<ROUTING_HEALTH_SUITE_HASH>"
  memorization_suite_hash: "<MEMORIZATION_SUITE_HASH>"
  thresholds_hash: "<FROZEN_PRETRAIN_THRESHOLDS_HASH>"
  results_hash: "<RESULTS_OR_NOT_STARTED>"
  status: not_started

context_stages:
  classification: EXPERIMENT_REQUIRED
  c0_4k: {status: not_started, report_hash: "<C0_REPORT_HASH>"}
  c1_8k: {status: not_started, report_hash: "<C1_REPORT_HASH>"}
  c2_16k_32k: {status: not_started, report_hash: "<C2_REPORT_HASH>"}
  c3_64k: {status: not_started, report_hash: "<C3_REPORT_HASH>"}
  c4_128k_256k:
    status: deferred_pending_evidence
    report_hash: "<C4_REPORT_HASH_OR_NOT_STARTED>"

posttrain_enterprise_action:
  classification: EXPERIMENT_REQUIRED
  base_pretrain_checkpoint_hash: "<BF16_PRETRAIN_BASE_HASH>"
  sft_checkpoint_hash: "<SFT_HASH_OR_NOT_STARTED>"
  preference_checkpoint_hash: "<PREFERENCE_HASH_OR_NOT_STARTED>"
  executable_rl_checkpoint_hash: "<EXECUTABLE_RL_HASH_OR_NOT_STARTED>"
  native_identity_report_hash: "<NATIVE_IDENTITY_REPORT_HASH>"
  task_splits:
    repository_engineering: "<IMMUTABLE_SPLIT_ID>"
    enterprise_systems: "<IMMUTABLE_SPLIT_ID>"
    governance_safe_execution: "<IMMUTABLE_SPLIT_ID>"
    corporate_communication: "<IMMUTABLE_SPLIT_ID>"
  vetcr_thresholds_hash: "<FROZEN_VETCR_THRESHOLDS_HASH>"
  status: not_started

release_artifacts:
  classification: EXPERIMENT_REQUIRED
  bf16_master_hash: "<BF16_MASTER_HASH_OR_NOT_STARTED>"
  bf16_master_gate_report_hash: "<BF16_MASTER_GATE_REPORT_HASH>"
  fp8_derivative_hash: "<FP8_HASH_OR_NOT_STARTED>"
  fp8_bf16_parity_report_hash: "<FP8_PARITY_REPORT_HASH_OR_NOT_STARTED>"
  status: not_started

compute_and_recovery:
  classification: EXPERIMENT_REQUIRED
  accelerator: NVIDIA_H200_SXM_141GB
  allowed_target_capacity: [512, 1024]
  topology_attestation_hash: "<TOPOLOGY_ATTESTATION_HASH>"
  nccl_acceptance_hash: "<NCCL_ACCEPTANCE_HASH>"
  mfu_report_hash: "<MFU_REPORT_HASH>"
  checkpoint_strategy_hash: "<CHECKPOINT_STRATEGY_HASH>"
  restore_drill_hash: "<RESTORE_DRILL_HASH>"
  budget_model_hash: "<BUDGET_MODEL_HASH>"
  target_run_allocation_confirmed: false

anti_contamination:
  classification: VERIFIED_FACT
  pretrain_eval_registry_hash: "<SEALED_PRETRAIN_EVAL_REGISTRY_HASH>"
  posttrain_eval_registry_hash: "<SEALED_POSTTRAIN_EVAL_REGISTRY_HASH>"
  denylist_hash: "<CONTAMINATION_DENYLIST_HASH>"
  report_hash: "<CONTAMINATION_REPORT_HASH>"

signatures:
  research_lead: "<SIGNATURE_REF>"
  data_lead: "<SIGNATURE_REF>"
  evaluation_lead: "<SIGNATURE_REF>"
  platform_lead: "<SIGNATURE_REF>"
  safety_governance_lead: "<SIGNATURE_REF>"
  program_owner: "<SIGNATURE_REF>"
