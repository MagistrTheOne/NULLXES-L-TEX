schema: laetex.runpod.profile/v3
name: fp8-export
enabled: true
stage: FP8
classification: EXPERIMENT_REQUIRED
purpose: "Convert immutable R1-BF16 to inference-only FP8 and prove parity."
platform: {provider: RunPod, cloud: Secure Cloud, accelerator: NVIDIA H200, local_model_workloads: forbidden}
compute: {minimum: {world_size: 512, nodes: 64}, recommended: {world_size: 1024, nodes: 128}, precision: "BF16 source to FP8 derivative"}
parallelism:
  minimum: {TP: 8, PP: 8, EP: 8, CP: 1, DP: 1}
  recommended: {TP: 8, PP: 8, EP: 16, CP: 1, DP: 1}
  rule: "world_size=TP*PP*EP*CP*DP"
network: {required: "provider-attested NVLink/NVSwitch and InfiniBand", acceptance: "identical source hash, export/load and parity replay"}
storage: {working: "RunPod Network Volume", durable_source_of_truth: "external encrypted immutable object registry"}
checkpoint: {input: "signed R1-BF16", output: "FP8 export, calibration/conversion and parity manifests", cadence: atomic, training_parent: forbidden}
wall_clock: {classification: ENGINEERING_HYPOTHESIS, estimate: "TBD by export and full parity throughput"}
gate: "task/safety parity and serving memory/latency gates pass"
economic_gate: "Promote only with measured cost/latency gain; R1-BF16 remains authoritative."
