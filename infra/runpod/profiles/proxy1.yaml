schema: laetex.runpod.profile/v3
name: proxy1
enabled: true
stage: PX1-1B
classification: EXPERIMENT_REQUIRED
purpose: "From-scratch 1B systems and scaling proxy; never a target parent."
platform: {provider: RunPod, cloud: Secure Cloud, accelerator: NVIDIA H200, local_model_workloads: forbidden}
compute: {minimum: {world_size: 8, nodes: 1}, recommended: {world_size: 16, nodes: 2}, precision: BF16}
parallelism:
