schema: laetex.runpod.profile/v2
name: baseline
phase: 0
classification: EXPERIMENT_REQUIRED
purpose: "BF16 baseline прямого 480B/35B Instruct foundation без изменения весов."
foundation:
  repo: Qwen/Qwen3-Coder-480B-A35B-Instruct
  role: foundation_and_production_candidate
  teacher: none
  master_precision: BF16
  parent: upstream-bf16
platform:
  provider: RunPod
  cloud: Secure Cloud
  local_model_workloads: forbidden
  deployment: {minimum: instant-cluster, recommended: instant-cluster}
compute:
  gpu: {model: NVIDIA H200 SXM, hbm_gb: 141, gpus_per_node: 8}
  minimum: {gpus: 16, nodes: 2}
  recommended: {gpus: 32, nodes: 4}
  precision: BF16
parallelism:
  minimum: {world_size: 16, TP: 8, PP: 2, CP: 1, DP: 1, EP: 1}
  recommended: {world_size: 32, TP: 8, PP: 2, CP: 1, DP: 2, EP: 1}
  world_size_rule: "world_size=TP*PP*CP*DP; EP is not an extra multiplier"
  ep_semantics: "EP=1 for inference; no expert routing update"
network:
  required: "NVLink/NVSwitch intra-node; provider-attested InfiniBand on RunPod ens* inter-node"
  acceptance: "Written IB attestation plus NCCL all-reduce/load test; no eth0 fallback; zero XID/ECC errors"
storage:
  working_set: "RunPod Network Volume /workspace"
  durable_registry: "External encrypted versioned object store with immutable manifests"
  local_scratch: ephemeral_only
checkpoint:
  input: "Immutable upstream BF16 snapshot, tokenizer and chat-template hashes"
  output: "No weight checkpoint; resumable task ledger and evaluation evidence only"
  cadence: "Task ledger every 15 minutes"
  retention: "All signed baseline evidence"
wall_clock:
  tag: ENGINEERING_HYPOTHESIS
  estimate: "12-36 hours after a 100-task throughput pilot"
metrics:
  primary: VETCR_baseline
  exact_gate: "100% attempt accounting; replay mismatch=0; missing evidence=0"
stop_conditions:
  - "Checksum mismatch or any model-weight mutation"
  - "Evaluation nondeterminism above frozen tolerance"
economic_gate: "Run only after held-out tasks, graders, retry budgets and thresholds are frozen."
artifacts:
  - baseline-results.jsonl
  - grader-replay-bundle
  - latency-cost-manifest
validation:
  profile_only: true
  checks:
    - "16=8*2*1*1 and 32=8*2*1*2"
    - "H200 SXM 141 GB only; no local workload"
    - "Network, storage and checkpoint acceptance recorded"
assumptions:
  - {tag: ENGINEERING_HYPOTHESIS, statement: "16 H200 физически достаточны для BF16 sharding после load/memory proof; 32 дают две replicas."}
  - {tag: RISK, statement: "Context/KV-cache headroom и throughput не подтверждены до Phase 0."}

