schema: laetex.runpod.profile/v2
name: router-world-model
enabled: true
phase: 5
classification: EXPERIMENT_REQUIRED
purpose: "Separate auxiliary jobs: Top-2 domain-adapter router and optional compact World Model V1."
foundation:
  repo: Qwen/Qwen3-Coder-480B-A35B-Instruct
  role: frozen_policy_reference
  teacher: none
  master_precision: BF16
  parent: M4-bf16-merged
platform:
  provider: RunPod
  cloud: Secure Cloud
  local_model_workloads: forbidden
  deployment: {minimum: secure-cloud-pod, recommended: instant-cluster}
compute:
  gpu: {model: NVIDIA H200 SXM, hbm_gb: 141, gpus_per_node: 8}
  minimum: {gpus: 8, nodes: 1, scope: auxiliary_router_or_compact_world_model_only}
  recommended: {gpus: 32, nodes: 4}
  precision: BF16
parallelism:
  minimum: {world_size: 8, TP: 1, PP: 1, CP: 1, DP: 8, EP: 1}
  recommended: {world_size: 32, TP: 2, PP: 1, CP: 1, DP: 16, EP: 1}
  world_size_rule: "world_size=TP*PP*CP*DP; EP is not an extra multiplier"
  ep_semantics: "EP=1 is the auxiliary model setting; Top-2 domain-adapter routing is not upstream MoE expert parallelism"
network:
  required: "NVLink/NVSwitch intra-node; provider-attested InfiniBand on RunPod ens* for multi-node"
  acceptance: "Written IB attestation, NCCL parity, state serialization and ledger replay; no eth0 fallback"
storage:
  working_set: "RunPod Network Volume /workspace; versioned traces and adapter packs"
  durable_registry: "External encrypted object store for trace lineage, router, V1 and calibration"
  local_scratch: ephemeral_only
checkpoint:
  input: "M4 hash/reference and state/action/outcome schema; 480B M4 shards are not loaded into the 8-GPU auxiliary training allocation"
  output: "Independent adapter-router and World Model V1 checkpoints; neither is merged into M4"
  cadence: "Auxiliary optimizer/RNG/data cursor every 1000 steps or 2 hours"
  retention: "Last 3 plus calibrated-best per auxiliary job; M4 remains immutable"
  optimizer_policy: "Fresh optimizer per auxiliary job; no policy optimizer state"
wall_clock:
  tag: ENGINEERING_HYPOTHESIS
  estimate: "Router 1-3 days; V1 3-10 days; controlled ablations 7-18 days"
metrics:
  primary: joint_routing_transition_acceptance
  exact_gate: "Top-2 recall>=90%; no domain>35%; delta exact-match>=80%; risk AUROC>=0.90; ECE<=0.05"
stop_conditions:
  - "Router collapse twice, unversioned state, tenant leakage or calibration deterioration"
  - "Any mutation of M4 base router or routed experts"
economic_gate: "V1 runs only if its early curve can beat deterministic V0 by >=5 pp."
artifacts:
  - adapter-router
  - routing-audit-schema
  - world-model-v1-or-no-go
  - calibration-and-ablation-report
validation:
  profile_only: true
  checks:
    - "8=1*1*1*8 and 32=2*1*1*16"
    - "8-GPU allocation trains auxiliary models only; it never loads or shards the 480B policy"
    - "Adapter router and upstream MoE router are separately named and measured"
    - "M4 remains the BF16 policy master"
assumptions:
  - {tag: ENGINEERING_HYPOTHESIS, statement: "8 H200 suffice only for auxiliary router/compact-model training; 32 accelerate independent ablations. Full 480B evaluation uses a separate minimum-16-H200 allocation pending memory proof."}
  - {tag: RISK, statement: "Learned V1 may not beat deterministic V0 and is allowed to terminate NO-GO."}

