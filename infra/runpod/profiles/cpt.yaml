schema: laetex.runpod.profile/v2
name: optional-dapt
enabled: false
phase: optional
classification: EXPERIMENT_REQUIRED
purpose: "Disabled optional domain-adaptive pretraining ablation only; it must not train identity, tool behavior, or produce an E-01 lineage parent."
foundation:
  repo: Qwen/Qwen3-Coder-480B-A35B-Instruct
  role: frozen_foundation_reference
  teacher: none
  master_precision: BF16
  parent: S0-bf16
platform:
  provider: RunPod
  cloud: Secure Cloud
  local_model_workloads: forbidden
  deployment: {minimum: instant-cluster, recommended: instant-cluster}
compute:
  gpu: {model: NVIDIA H200 SXM, hbm_gb: 141, gpus_per_node: 8}
  minimum: {gpus: 16, nodes: 2}
  recommended: {gpus: 32, nodes: 4}
  precision: "BF16 weights and LoRA; no FP8 training"
parallelism:
  minimum: {world_size: 16, TP: 8, PP: 2, CP: 1, DP: 1, EP: 1}
  recommended: {world_size: 32, TP: 8, PP: 2, CP: 1, DP: 2, EP: 1}
  world_size_rule: "world_size=TP*PP*CP*DP; EP is not an extra multiplier"
  ep_semantics: "Base router and routed experts remain frozen; EP=1"
network:
  required: "Provider-attested NVLink/NVSwitch intra-node and provider-attested InfiniBand inter-node"
  acceptance: "Written provider fabric/topology attestation, NCCL all-reduce, checkpoint-load and gradient parity; no eth0 fallback"
storage:
  working_set: "RunPod Network Volume /workspace; licensed DAPT ablation shards only"
  durable_registry: "External encrypted object store for S0, optional adapter, optimizer state and ablation evidence"
  local_scratch: ephemeral_only
checkpoint:
  input: "Immutable S0 BF16 master hash"
  output: "Optional DAPT ablation adapter only; never A1, M1, or a lineage parent"
  cadence: "Adapter plus optimizer/RNG/data cursor every 500 steps or 2 hours if explicitly enabled"
  retention: "S0 hash, DAPT adapter, optimizer state, data lineage and ablation report"
  optimizer_policy: "Fresh optimizer; identity/tool datasets and objectives forbidden"
wall_clock:
  tag: ENGINEERING_HYPOTHESIS
  estimate: "1-4 days on 16 H200 or 1-2 days on 32 after explicit ablation approval"
metrics:
  primary: domain_perplexity_without_capability_regression
  exact_gate: "Held-out domain perplexity improves >=5%; protected coding regression<=1 pp; identity/tool behavior delta within frozen tolerance"
stop_conditions:
  - "Profile remains disabled without a signed DAPT ablation approval"
  - "Any identity/tool training example, objective, or behavior-targeting loss is detected"
  - "Any base-router or routed-expert weight mutation"
economic_gate: "Enable only if retrieval/SFT baselines fail and expected domain gain justifies a separate H200 ablation; never required for E-01."
artifacts:
  - optional-dapt-adapter
  - dapt-ablation-and-lineage-report
validation:
  profile_only: true
  checks:
    - "enabled=false"
    - "16=8*2*1*1 and 32=8*2*1*2"
    - "No identity/tool objective; no A1/M1 output; no lineage-parent promotion"
assumptions:
  - {tag: EXPERIMENT_REQUIRED, statement: "DAPT must beat retrieval and SFT controls before it can be enabled."}
  - {tag: RISK, statement: "DAPT can cause catastrophic forgetting without producing an enterprise action advantage."}

