schema: laetex.runpod.profile/v2
name: release-eval
enabled: true
phase: 6
classification: EXPERIMENT_REQUIRED
purpose: "Frozen BF16 release qualification plus evaluation of a separately converted FP8 serving derivative."
foundation:
  repo: Qwen/Qwen3-Coder-480B-A35B-Instruct
  role: foundation_and_production_candidate
  teacher: none
  master_precision: BF16
  parent: M4-bf16-merged
platform:
  provider: RunPod
  cloud: Secure Cloud
  local_model_workloads: forbidden
  deployment: {minimum: instant-cluster, recommended: instant-cluster, fp8_candidate: secure-cloud-pod}
compute:
  gpu: {model: NVIDIA H200 SXM, hbm_gb: 141, gpus_per_node: 8}
  minimum: {gpus: 16, nodes: 2}
  recommended: {gpus: 32, nodes: 4}
  fp8_serving_candidate: {minimum_gpus: 8, recommended_gpus: 16, requires_completed_16_gpu_conversion: true, fit_and_parity_required: true}
  precision: "BF16 master qualification; FP8 is an export candidate only"
parallelism:
  minimum: {world_size: 16, TP: 8, PP: 2, CP: 1, DP: 1, EP: 1}
  recommended: {world_size: 32, TP: 8, PP: 2, CP: 1, DP: 2, EP: 1}
  fp8_serving_minimum: {world_size: 8, TP: 8, PP: 1, CP: 1, DP: 1, EP: 1}
  fp8_serving_recommended: {world_size: 16, TP: 8, PP: 2, CP: 1, DP: 1, EP: 1}
  world_size_rule: "world_size=TP*PP*CP*DP; EP is not an extra multiplier"
  ep_semantics: "EP=1; frozen inference only"
network:
  required: "NVLink/NVSwitch intra-node; provider-attested InfiniBand on RunPod ens* for BF16 multi-node"
  acceptance: "Written IB attestation, NCCL/load test, identical bundle hash and deterministic grader replay"
storage:
  working_set: "RunPod Network Volume /workspace; frozen M4, private eval cache and replay bundles"
  durable_registry: "External encrypted object store for M4 master, FP8 export, evidence and signatures"
  local_scratch: ephemeral_only
checkpoint:
  input: "Frozen M4 BF16 master plus independent router/World Model artifacts if accepted"
  output: "No training or conversion checkpoint; signed BF16 release manifest and optional FP8 serving parity manifest"
  cadence: "Task ledger every 15 minutes; signed evidence batch hourly"
  retention: "All release evidence, M4 BF16 and qualified FP8 export"
  optimizer_policy: "No optimizer; training and merge disabled"
wall_clock:
  tag: ENGINEERING_HYPOTHESIS
  estimate: "Smoke 4-8 hours; full BF16 gate 2-7 days; FP8 parity adds 1-3 days"
metrics:
  primary: VETCR
  exact_gate: "Two clean runs; frozen VETCR bounds pass; identity/unsafe/replay failures=0; audit=100%; coding regression<=2 pp"
stop_conditions:
  - "Any critical security/governance, lineage, signature or contamination failure"
  - "FP8 parity failure; BF16 master remains unaffected"
economic_gate: "Full release run only after integrity smoke; FP8 serving on 8/16 GPUs only after separate 16/32-GPU conversion/export, measured fit and quality parity."
artifacts:
  - signed-bf16-release-bundle
  - optional-fp8-serving-parity-bundle
  - laetex-bench-evidence
  - release-or-reject-decision
validation:
  profile_only: true
  checks:
    - "BF16: 16=8*2*1*1 and 32=8*2*1*2"
    - "FP8 serving only: 8=8*1*1*1 and 16=8*2*1*1; conversion uses fp8-export.yaml at 16/32"
    - "FP8 is never a training or merge parent"
assumptions:
  - {tag: ENGINEERING_HYPOTHESIS, statement: "BF16 960 GB weights make 8 H200 physically tight; 16 is the minimum pending memory proof."}
  - {tag: RISK, statement: "FP8 kernels or quality may fail parity; BF16 remains the release source of truth."}

