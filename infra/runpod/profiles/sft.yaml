schema: laetex.runpod.profile/v1
name: sft
phase: 2
classification: ENGINEERING_HYPOTHESIS
purpose: "Verified enterprise SFT и identity/tool-contract overwrite."
platform:
  provider: RunPod
  cloud: Secure Cloud
  deployment: {minimum: secure-cloud-pod, recommended: instant-cluster}
  local_model_workloads: forbidden
compute:
  gpu: {model: NVIDIA H200 SXM, hbm_gb: 141}
  minimum_gpus: 8
  recommended_gpus: 32
  minimum_nodes: 1
  recommended_nodes: 4
  gpus_per_node: 8
  precision: BF16
parallelism:
  minimum: {TP: 2, PP: 1, EP: 4, CP: 1, DP: 4}
  recommended: {TP: 2, PP: 1, EP: 8, CP: 1, DP: 16}
  note: "World size 8/32 via TP×PP×CP×DP; adapter parameters separately sharded, EP mapping validated before run."
network:
  intra_node: NVLink/NVSwitch
  inter_node: "Required before run: provider-attested InfiniBand/high-bandwidth fabric on RunPod ens*; external docs do not attest this allocation"
  acceptance: "IB/NCCL and dataloader acceptance; no public training endpoint"
storage:
  working_set: "/workspace Network Volume: verified examples and active adapter checkpoints"
  durable_registry: "External encrypted object store: immutable SFT data, base/CPT snapshot, promoted bundle"
  minimum_working_set_tb: 4
  recommended_working_set_tb: 8
checkpoint:
  format: "Distributed base reference + adapter/trainable-state shards"
  cadence: "Every 500 steps or 2 hours"
  retained: "last 3 + metric-best + end-of-epoch"
wall_clock:
  tag: ENGINEERING_HYPOTHESIS
  estimate: "4–10 days on 8 H200 or 1–4 days on 32 H200, including periodic evaluation"
metrics:
  primary: "Verified SFT task exact-pass rate"
  exact_gate: ">=10% relative VETCR gain over CPT and identity leakage = 0/10,000 adversarial prompts"
stop_conditions:
  - "Identity leakage >0 at release-candidate eval"
  - ">2 pp regression on protected coding baseline"
  - "Validation loss rises in two consecutive evaluations"
economic_gate: "Run recommended size only when verified-example acceptance >=90% and one-epoch pilot shows positive VETCR slope."
artifacts:
  - "laetex-sft-adapter-bundle"
  - "chat-template-and-tool-schema"
  - "identity-adversarial-report"
  - "protected-capability-report"
validation:
  schema_checks:
    - "Secure Cloud 8xH200 Pod minimum; H200 Instant Cluster recommended"
    - "Tokenizer hash equals approved base tokenizer"
    - "No raw tenant data without opt-in lineage"
    - "No secrets"
  status: documentation_profile_not_provisioning
assumptions:
  - {tag: ENGINEERING_HYPOTHESIS, statement: "BF16 LoRA/selective tuning предпочтительнее QLoRA для E-01 fidelity."}
  - {tag: RISK, statement: "Identity overwrite может снизить coding capability без replay mix."}

