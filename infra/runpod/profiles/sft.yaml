schema: laetex.runpod.profile/v2
name: enterprise-action-sft
phase: 2
classification: ENGINEERING_HYPOTHESIS
purpose: "Enterprise Action SFT as BF16 LoRA on M1."
foundation:
  repo: Qwen/Qwen3-Coder-480B-A35B-Instruct
  role: foundation_and_production_candidate
  teacher: none
  master_precision: BF16
  parent: M1-bf16-merged
platform:
  provider: RunPod
  cloud: Secure Cloud
  local_model_workloads: forbidden
  deployment: {minimum: instant-cluster, recommended: instant-cluster}
compute:
  gpu: {model: NVIDIA H200 SXM, hbm_gb: 141, gpus_per_node: 8}
  minimum: {gpus: 16, nodes: 2}
  recommended: {gpus: 32, nodes: 4}
  long_context_recommended: {gpus: 64, nodes: 8, sequence_tokens: "32768-65536"}
  precision: "BF16 weights and LoRA; no FP8 training"
parallelism:
  minimum: {world_size: 16, TP: 8, PP: 2, CP: 1, DP: 1, EP: 1}
  recommended: {world_size: 32, TP: 8, PP: 2, CP: 1, DP: 2, EP: 1}
  long_context_recommended: {world_size: 64, TP: 8, PP: 2, CP: 2, DP: 2, EP: 1}
  world_size_rule: "world_size=TP*PP*CP*DP; EP is not an extra multiplier"
  ep_semantics: "Base router and 160 routed experts frozen; adapter-router is not trained in this phase"
network:
  required: "NVLink/NVSwitch intra-node; provider-attested InfiniBand on RunPod ens* inter-node"
  acceptance: "Written IB attestation, NCCL, dataloader and distributed-loss parity; no eth0 fallback"
storage:
  working_set: "RunPod Network Volume /workspace; verified SFT examples and adapter state"
  durable_registry: "External encrypted object store for M1, A2, M2, data manifests and evidence"
  local_scratch: ephemeral_only
checkpoint:
  input: "M1 BF16 master plus frozen tokenizer/template contract"
  output: "A2 retained Enterprise Action SFT adapter; M2=A2 merged into M1 in BF16"
  cadence: "Adapter plus optimizer/RNG/data cursor every 500 steps or 2 hours"
  retention: "M1, promoted A2 adapters, M2 BF16 and merge/eval manifests"
  optimizer_policy: "Fresh optimizer initialized from M1; no Stage 1 optimizer resume"
wall_clock:
  tag: ENGINEERING_HYPOTHESIS
  estimate: "8-16K: 3-8 days on 16 H200 or 2-5 days on 32; 32-64K: 3-8 days on 64 after pilot"
metrics:
  primary: VETCR
  exact_gate: ">=10% relative gain over M1; schema>=99.5%; evidence>=98%; coding regression<=2 pp"
stop_conditions:
  - "Identity leakage, schema validity <99%, or protected coding regression >2 pp"
  - "Any base-router or routed-expert weight mutation"
economic_gate: "Scale only when accepted-example rate>=90% and pilot VETCR slope is positive."
artifacts:
  - A2-enterprise-action-sft-lora
  - M2-bf16-merged
  - action-sft-lineage-and-evidence
validation:
  profile_only: true
  checks:
    - "16=8*2*1*1; 32=8*2*1*2; 64=8*2*2*2"
    - "A2 retained; M2 BF16 only; fresh optimizer"
    - "No raw tenant data without explicit opt-in lineage"
assumptions:
  - {tag: ENGINEERING_HYPOTHESIS, statement: "BF16 LoRA plus protected replay can improve enterprise actions without expert tuning."}
  - {tag: RISK, statement: "Frozen experts may cap domain adaptation; unfreeze is not an E-01 default."}

