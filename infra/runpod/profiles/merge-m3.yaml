schema: laetex.runpod.profile/v2
name: merge-m3
enabled: true
phase: 3-merge
classification: EXPERIMENT_REQUIRED
purpose: "Deterministically merge retained A3 into immutable M2 and qualify a new BF16 M3 parent."
foundation:
  repo: Qwen/Qwen3-Coder-480B-A35B-Instruct
  role: foundation_and_production_candidate
  teacher: none
  master_precision: BF16
  parent: M2-bf16
platform:
  provider: RunPod
  cloud: Secure Cloud
  local_model_workloads: forbidden
  deployment: {minimum: instant-cluster, recommended: instant-cluster}
compute:
  gpu: {model: NVIDIA H200 SXM, hbm_gb: 141, gpus_per_node: 8}
  minimum: {gpus: 16, nodes: 2}
  recommended: {gpus: 32, nodes: 4}
  precision: "BF16 load, merge and output only; FP8 forbidden"
parallelism:
  minimum: {world_size: 16, TP: 8, PP: 2, CP: 1, DP: 1, EP: 1}
  recommended: {world_size: 32, TP: 8, PP: 2, CP: 1, DP: 2, EP: 1}
  world_size_rule: "world_size=TP*PP*CP*DP; EP is not an extra multiplier"
  ep_semantics: "Frozen merge/load path; EP=1"
network:
  required: "Provider-attested NVLink/NVSwitch intra-node and provider-attested InfiniBand inter-node"
  acceptance: "Written provider fabric/topology attestation, NCCL/load parity and zero XID/ECC errors"
storage:
  working_set: "RunPod Network Volume /workspace; checksum-bound M2 and A3 staging"
  durable_registry: "External encrypted immutable registry for M2, retained A3, M3 and evidence"
  local_scratch: ephemeral_only
checkpoint:
  input: "Immutable M2 BF16 parent hash plus immutable promoted A3 hash"
  output: "Immutable new M3 BF16 parent hash; A3 remains separately retained"
  cadence: "No periodic checkpoint; atomic staged export followed by checksum and reload"
  retention: "M2, A3, M3, merge manifest and full pre/post-merge regression evidence"
  optimizer_policy: "No optimizer or scheduler; training disabled"
wall_clock:
  tag: ENGINEERING_HYPOTHESIS
  estimate: "12-36 hours including full regression"
metrics:
  primary: full_regression_parity
  exact_gate: "Full protected regression passes; preference/safety gates pass; checksum/reload mismatch=0; unexplained metric regression=0"
stop_conditions:
  - "Missing/changed M2 or A3 hash, any optimizer state, or non-BF16 output"
  - "Any full-regression, lineage, reload or determinism failure"
economic_gate: "Run only after A3 promotion and frozen full-regression bundle are signed."
artifacts:
  - M3-bf16-immutable-parent
  - retained-A3-preference-lora
  - M3-merge-manifest-and-full-regression
validation:
  profile_only: true
  checks:
    - "16=8*2*1*1 and 32=8*2*1*2"
    - "M3=BF16(M2+A3); A3 retained; no optimizer"
    - "M3 receives a new immutable hash only after full regression"
assumptions:
  - {tag: EXPERIMENT_REQUIRED, statement: "Distributed BF16 adapter merge is numerically stable and reload-equivalent."}
  - {tag: RISK, statement: "Preference improvements can conceal governance regressions; slice-level parity is mandatory."}
