[build-system]
requires = ["hatchling>=1.25"]
build-backend = "hatchling.build"

[project]
name = "laetex-megatron"
version = "0.1.0"
description = "Megatron-Core compatibility contracts for LÆTEX"
readme = "README.md"
requires-python = ">=3.10"
license = { text = "Proprietary" }
dependencies = []

[project.optional-dependencies]
megatron = ["megatron-core", "transformer-engine[pytorch]"]
dev = ["pytest>=8"]

[tool.hatch.build.targets.wheel]
packages = ["src/laetex_megatron"]
