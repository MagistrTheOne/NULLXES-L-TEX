[build-system]
requires = ["hatchling>=1.25"]
build-backend = "hatchling.build"

[project]
name = "laetex-hf"
version = "0.1.0"
description = "Hugging Face compatibility bridge for LÆTEX models"
readme = "README.md"
requires-python = ">=3.10"
license = { text = "Proprietary" }
dependencies = ["laetex-core>=0.1.0"]

[project.optional-dependencies]
transformers = ["transformers>=4.51"]
dev = ["pytest>=8", "transformers>=4.51"]

[tool.hatch.build.targets.wheel]
packages = ["src/laetex_hf"]
